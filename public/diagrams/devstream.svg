<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 195" font-family="Pretendard, system-ui, sans-serif">
  <!-- Dashed divider -->
  <line x1="310" y1="5" x2="310" y2="190" stroke="#e4e4e7" stroke-width="1" stroke-dasharray="4"/>

