<svg viewBox="0 0 820 450" xmlns="http://www.w3.org/2000/svg" font-family="'Pretendard Variable', Pretendard, system-ui, sans-serif">
  <rect width="820" height="450" fill="#ffffff"/>

  <!-- Title -->
  <text x="410" y="36" text-anchor="middle" font-size="16" font-weight="700" fill="#18181b">Stock Briefing — 매일 금융 콘텐츠를 자동 발행하는 AI 파이프라인</text>

  <!-- ── Flow Header ── -->
  <text x="30" y="76" font-size="10" font-weight="700" fill="#a1a1aa" letter-spacing="2">FLOW</text>
  <line x1="30" y1="84" x2="790" y2="84" stroke="#e4e4e7" stroke-width="1"/>

  <!-- ── Stage 1: Data Sources ── -->
  <rect x="30" y="102" width="170" height="170" rx="8" fill="#ffffff" stroke="#d4d4d8" stroke-width="1.5"/>
  <text x="115" y="124" text-anchor="middle" font-size="11" font-weight="700" fill="#18181b">Data Sources</text>
  <text x="115" y="140" text-anchor="middle" font-size="9" fill="#a1a1aa">6 markets · 10+ APIs</text>

  <text x="46" y="164" font-size="10" fill="#52525b">· 네이버 금융 · DART</text>
  <text x="46" y="182" font-size="10" fill="#52525b">· Finnhub · yfinance</text>
  <text x="46" y="200" font-size="10" fill="#52525b">· SEC EDGAR</text>
  <text x="46" y="218" font-size="10" fill="#52525b">· Upbit (암호화폐)</text>
  <text x="46" y="236" font-size="10" fill="#52525b">· Google Trends · GSC</text>
  <text x="46" y="254" font-size="10" fill="#52525b">· 네이버 뉴스 API</text>

  <!-- Arrow 1 -->
  <line x1="200" y1="187" x2="230" y2="187" stroke="#d4d4d8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ── Stage 2: Collectors ── -->
  <rect x="232" y="102" width="170" height="170" rx="8" fill="#ffffff" stroke="#d4d4d8" stroke-width="1.5"/>
  <text x="317" y="124" text-anchor="middle" font-size="11" font-weight="700" fill="#18181b">Collectors</text>
  <text x="317" y="140" text-anchor="middle" font-size="9" fill="#a1a1aa">async 병렬 수집</text>

  <text x="248" y="164" font-size="10" fill="#52525b">· 시장 · 뉴스 · 공시</text>
  <text x="248" y="182" font-size="10" fill="#52525b">· 기술적 지표</text>
  <text x="248" y="200" font-size="10" fill="#52525b">· 트렌드 · 검색 콘솔</text>

  <rect x="248" y="216" width="138" height="46" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1"/>
  <text x="317" y="232" text-anchor="middle" font-size="10" font-weight="700" fill="#1e40af">Dedup (RAG)</text>
  <text x="317" y="246" text-anchor="middle" font-size="9" fill="#3b82f6">ChromaDB · Gemini 임베딩</text>
  <text x="317" y="258" text-anchor="middle" font-size="9" fill="#3b82f6">시맨틱 중복 제거</text>

  <!-- Arrow 2 -->
  <line x1="402" y1="187" x2="432" y2="187" stroke="#d4d4d8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ── Stage 3: LLM Layer (highlighted) ── -->
  <rect x="434" y="102" width="170" height="170" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="519" y="124" text-anchor="middle" font-size="11" font-weight="700" fill="#1e40af">LLM Layer</text>
  <text x="519" y="140" text-anchor="middle" font-size="9" fill="#3b82f6">의사결정 + 글쓰기</text>

  <rect x="450" y="152" width="138" height="32" rx="5" fill="#ffffff" stroke="#93c5fd" stroke-width="1"/>
  <text x="519" y="167" text-anchor="middle" font-size="10" font-weight="600" fill="#1e40af">AiProvider</text>
  <text x="519" y="178" text-anchor="middle" font-size="8" fill="#3b82f6">Claude · Gemini · CLI</text>

  <rect x="450" y="190" width="138" height="32" rx="5" fill="#ffffff" stroke="#93c5fd" stroke-width="1"/>
  <text x="519" y="205" text-anchor="middle" font-size="10" font-weight="600" fill="#1e40af">LLM Pipeline</text>
  <text x="519" y="216" text-anchor="middle" font-size="8" fill="#3b82f6">주제 선정 → 기사 작성 → 검수</text>

  <rect x="450" y="228" width="138" height="32" rx="5" fill="#ffffff" stroke="#93c5fd" stroke-width="1"/>
  <text x="519" y="243" text-anchor="middle" font-size="10" font-weight="600" fill="#1e40af">Prompt System</text>
  <text x="519" y="254" text-anchor="middle" font-size="8" fill="#3b82f6">톤·스타일·SEO 규칙</text>

  <!-- Arrow 3 -->
  <line x1="604" y1="187" x2="634" y2="187" stroke="#d4d4d8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ── Stage 4: Publishers ── -->
  <rect x="636" y="102" width="154" height="170" rx="8" fill="#ffffff" stroke="#d4d4d8" stroke-width="1.5"/>
  <text x="713" y="124" text-anchor="middle" font-size="11" font-weight="700" fill="#18181b">Publishers</text>
  <text x="713" y="140" text-anchor="middle" font-size="9" fill="#a1a1aa">SEO 자동 최적화</text>

  <text x="652" y="164" font-size="10" fill="#52525b">· WordPress REST</text>
  <text x="652" y="182" font-size="10" fill="#52525b">· Rank Math 메타</text>
  <text x="652" y="200" font-size="10" fill="#52525b">· OG 이미지 생성</text>
  <text x="652" y="218" font-size="10" fill="#52525b">· 주가 차트 생성</text>
  <text x="652" y="236" font-size="10" fill="#52525b">· Google 색인 요청</text>
  <text x="652" y="254" font-size="10" fill="#52525b">· Gmail SMTP 발송</text>

  <!-- ── Observability Layer (below) ── -->
  <text x="30" y="316" font-size="10" font-weight="700" fill="#a1a1aa" letter-spacing="2">OBSERVABILITY</text>
  <line x1="30" y1="324" x2="790" y2="324" stroke="#e4e4e7" stroke-width="1"/>

  <!-- Arrow from LLM → Trace Store -->
  <line x1="519" y1="272" x2="519" y2="346" stroke="#d4d4d8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="528" y="316" font-size="9" fill="#71717a">AI 호출 기록</text>

  <rect x="260" y="348" width="300" height="70" rx="8" fill="#ffffff" stroke="#52525b" stroke-width="1.5"/>
  <text x="410" y="370" text-anchor="middle" font-size="11" font-weight="700" fill="#18181b">Trace Store (SQLite)</text>
  <text x="410" y="388" text-anchor="middle" font-size="9" fill="#71717a">모든 AI 호출의 토큰 · 비용 · 레이턴시 · 프롬프트 기록</text>
  <text x="410" y="404" text-anchor="middle" font-size="9" fill="#71717a">run_id 기반 추적 · 품질 개선의 근거 데이터</text>

  <!-- FastAPI Dashboard -->
  <rect x="30" y="348" width="210" height="70" rx="8" fill="#ffffff" stroke="#d4d4d8" stroke-width="1.5"/>
  <text x="135" y="370" text-anchor="middle" font-size="11" font-weight="700" fill="#18181b">FastAPI 대시보드</text>
  <text x="135" y="388" text-anchor="middle" font-size="9" fill="#71717a">/pipelines — 수동 실행</text>
  <text x="135" y="402" text-anchor="middle" font-size="9" fill="#71717a">/traces — AI 호출 조회</text>

  <!-- DB Archive -->
  <rect x="580" y="348" width="210" height="70" rx="8" fill="#ffffff" stroke="#d4d4d8" stroke-width="1.5"/>
  <text x="685" y="370" text-anchor="middle" font-size="11" font-weight="700" fill="#18181b">Archive</text>
  <text x="685" y="388" text-anchor="middle" font-size="9" fill="#71717a">/archive — 발행 이력</text>
  <text x="685" y="402" text-anchor="middle" font-size="9" fill="#71717a">캘린더 히트맵 대시보드</text>

  <!-- Connectors -->
  <line x1="240" y1="383" x2="260" y2="383" stroke="#d4d4d8" stroke-width="1.5"/>
  <line x1="560" y1="383" x2="580" y2="383" stroke="#d4d4d8" stroke-width="1.5"/>

  <!-- Arrow defs -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#d4d4d8"/>
    </marker>
  </defs>
</svg>
