<svg viewBox="0 0 820 520" xmlns="http://www.w3.org/2000/svg" font-family="'Pretendard Variable', Pretendard, system-ui, sans-serif">
  <rect width="820" height="520" fill="#ffffff"/>

  <!-- Title -->
  <text x="410" y="36" text-anchor="middle" font-size="16" font-weight="700" fill="#18181b">Houseping — 모듈 의존 관계</text>

  <!-- ── Layer 1: app ── -->
  <rect x="310" y="60" width="200" height="56" rx="8" fill="#18181b"/>
  <text x="410" y="82" text-anchor="middle" font-size="12" font-weight="700" fill="#fafafa">houseping-app</text>
  <text x="410" y="100" text-anchor="middle" font-size="10" fill="#a1a1aa">엔트리포인트 · 설정 · 빈 조립</text>

  <!-- Arrows: app → 4 modules -->
  <line x1="340" y1="116" x2="120" y2="160" stroke="#d4d4d8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="385" y1="116" x2="320" y2="160" stroke="#d4d4d8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="435" y1="116" x2="500" y2="160" stroke="#d4d4d8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="480" y1="116" x2="700" y2="160" stroke="#d4d4d8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ── Layer 2: web, scheduler, external-api, admin ── -->
  <rect x="30" y="164" width="180" height="60" rx="8" fill="#ffffff" stroke="#d4d4d8" stroke-width="1.5"/>
  <text x="120" y="186" text-anchor="middle" font-size="11" font-weight="700" fill="#18181b">houseping-web</text>
  <text x="120" y="204" text-anchor="middle" font-size="9" fill="#71717a">공개 웹 · 시세 비교 · 지도</text>

  <rect x="230" y="164" width="180" height="60" rx="8" fill="#ffffff" stroke="#d4d4d8" stroke-width="1.5"/>
  <text x="320" y="186" text-anchor="middle" font-size="11" font-weight="700" fill="#18181b">houseping-scheduler</text>
  <text x="320" y="204" text-anchor="middle" font-size="9" fill="#71717a">@SchedulerMonitor · 배치 수집</text>

  <rect x="430" y="164" width="180" height="60" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="520" y="186" text-anchor="middle" font-size="11" font-weight="700" fill="#1e40af">external-api</text>
  <text x="520" y="204" text-anchor="middle" font-size="9" fill="#3b82f6">외부 API · Port 구현체</text>

  <rect x="630" y="164" width="160" height="60" rx="8" fill="#ffffff" stroke="#d4d4d8" stroke-width="1.5"/>
  <text x="710" y="186" text-anchor="middle" font-size="11" font-weight="700" fill="#18181b">houseping-admin</text>
  <text x="710" y="204" text-anchor="middle" font-size="9" fill="#71717a">관리자 콘솔 · 수집 트리거</text>

  <!-- Arrows: Layer 2 → core -->
  <line x1="120" y1="224" x2="320" y2="300" stroke="#d4d4d8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="320" y1="224" x2="380" y2="300" stroke="#d4d4d8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="520" y1="224" x2="450" y2="300" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arrow-blue)"/>
  <line x1="710" y1="224" x2="500" y2="300" stroke="#d4d4d8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- implements Port 라벨 -->
  <text x="500" y="266" text-anchor="middle" font-size="9" font-weight="600" fill="#2563eb">implements Port</text>

  <!-- ── Layer 3: core ── -->
  <rect x="220" y="304" width="400" height="100" rx="8" fill="#ffffff" stroke="#18181b" stroke-width="1.5"/>
  <text x="420" y="328" text-anchor="middle" font-size="13" font-weight="700" fill="#18181b">houseping-core</text>
  <text x="420" y="346" text-anchor="middle" font-size="10" fill="#71717a">도메인 · 서비스 · DB · 포맷터 · 외부 API Port</text>

  <rect x="236" y="358" width="72" height="30" rx="5" fill="#fafafa" stroke="#e4e4e7" stroke-width="1"/>
  <text x="272" y="377" text-anchor="middle" font-size="9" font-weight="600" fill="#52525b">domain</text>

  <rect x="316" y="358" width="52" height="30" rx="5" fill="#eff6ff" stroke="#2563eb" stroke-width="1"/>
  <text x="342" y="377" text-anchor="middle" font-size="9" font-weight="700" fill="#1e40af">port</text>

  <rect x="376" y="358" width="66" height="30" rx="5" fill="#fafafa" stroke="#e4e4e7" stroke-width="1"/>
  <text x="409" y="377" text-anchor="middle" font-size="9" font-weight="600" fill="#52525b">service</text>

  <rect x="450" y="358" width="42" height="30" rx="5" fill="#fafafa" stroke="#e4e4e7" stroke-width="1"/>
  <text x="471" y="377" text-anchor="middle" font-size="9" font-weight="600" fill="#52525b">DB</text>

  <rect x="500" y="358" width="52" height="30" rx="5" fill="#fafafa" stroke="#e4e4e7" stroke-width="1"/>
  <text x="526" y="377" text-anchor="middle" font-size="9" font-weight="600" fill="#52525b">fmt</text>

  <rect x="560" y="358" width="48" height="30" rx="5" fill="#fafafa" stroke="#e4e4e7" stroke-width="1"/>
  <text x="584" y="377" text-anchor="middle" font-size="9" font-weight="600" fill="#52525b">store</text>

  <!-- Arrow: core → PostgreSQL -->
  <line x1="420" y1="404" x2="420" y2="436" stroke="#d4d4d8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- PostgreSQL -->
  <rect x="350" y="440" width="140" height="34" rx="17" fill="#18181b"/>
  <text x="420" y="462" text-anchor="middle" font-size="11" font-weight="600" fill="#fafafa">PostgreSQL</text>

  <!-- 범례 -->
  <line x1="30" y1="492" x2="60" y2="492" stroke="#52525b" stroke-width="1.5"/>
  <text x="68" y="496" font-size="10" fill="#52525b">직접 의존</text>

  <line x1="160" y1="492" x2="190" y2="492" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="5 3"/>
  <text x="198" y="496" font-size="10" fill="#52525b">의존성 역전 (Port)</text>

  <!-- Arrow defs -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#d4d4d8"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#2563eb"/>
    </marker>
  </defs>
</svg>
