<svg viewBox="0 0 800 620" xmlns="http://www.w3.org/2000/svg" font-family="'Pretendard Variable', Pretendard, system-ui, sans-serif">
  <rect width="800" height="620" fill="#ffffff"/>

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" font-size="16" font-weight="700" fill="#18181b">ALIO-GW — 애플리케이션 레벨 Failover</text>

  <!-- ── Sender (with Circuit Breaker) — 감지 주체 ── -->
  <rect x="80" y="80" width="320" height="120" rx="8" fill="#ffffff" stroke="#18181b" stroke-width="1.5"/>
  <text x="240" y="104" text-anchor="middle" font-size="12" font-weight="700" fill="#18181b">Sender (감지자)</text>
  <text x="240" y="120" text-anchor="middle" font-size="10" fill="#71717a">IDC 장애 실시간 감지</text>

  <rect x="100" y="134" width="280" height="52" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1"/>
  <text x="240" y="154" text-anchor="middle" font-size="10" font-weight="700" fill="#1e40af">Circuit Breaker (Resilience4j)</text>
  <text x="240" y="172" text-anchor="middle" font-size="9" fill="#3b82f6">Sliding Window · 동적 임계값</text>

  <!-- ── API (수동 트리거) ── -->
  <rect x="500" y="108" width="200" height="64" rx="8" fill="#ffffff" stroke="#a1a1aa" stroke-width="1.5"/>
  <text x="600" y="132" text-anchor="middle" font-size="11" font-weight="600" fill="#52525b">API</text>
  <text x="600" y="150" text-anchor="middle" font-size="10" fill="#71717a">수동 Failover 트리거</text>
  <text x="600" y="164" text-anchor="middle" font-size="9" fill="#a1a1aa">(운영자 개입 경로)</text>

  <!-- Arrows: Sender → Redis / RabbitMQ (실선) -->
  <line x1="180" y1="200" x2="220" y2="268" stroke="#d4d4d8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="300" y1="200" x2="500" y2="268" stroke="#d4d4d8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Arrow: API → RabbitMQ (점선) -->
  <line x1="600" y1="172" x2="580" y2="268" stroke="#d4d4d8" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

  <!-- ── Redis ── -->
  <rect x="120" y="270" width="200" height="70" rx="8" fill="#ffffff" stroke="#52525b" stroke-width="1.5"/>
  <text x="220" y="290" text-anchor="middle" font-size="12" font-weight="700" fill="#18181b">Redis</text>
  <text x="220" y="306" text-anchor="middle" font-size="9" fill="#71717a">서버 단위 목적지 IDC 공유</text>
  <text x="220" y="319" text-anchor="middle" font-size="9" fill="#71717a">재기동/신규 프로세스 동기화</text>
  <text x="220" y="332" text-anchor="middle" font-size="9" fill="#71717a">중복 Failover 이벤트 방지</text>

  <!-- ── RabbitMQ ── -->
  <rect x="460" y="270" width="200" height="70" rx="8" fill="#ffffff" stroke="#52525b" stroke-width="1.5"/>
  <text x="560" y="294" text-anchor="middle" font-size="12" font-weight="700" fill="#18181b">RabbitMQ</text>
  <text x="560" y="312" text-anchor="middle" font-size="10" fill="#71717a">fanout · 이벤트 브로드캐스트</text>
  <text x="560" y="326" text-anchor="middle" font-size="9" fill="#a1a1aa">실시간 상태 전파 채널</text>

  <!-- Arrows: RabbitMQ → Other Senders (실선) -->
  <line x1="500" y1="340" x2="200" y2="450" stroke="#d4d4d8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="560" y1="340" x2="400" y2="450" stroke="#d4d4d8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="620" y1="340" x2="600" y2="450" stroke="#d4d4d8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Arrow from Redis to Senders (재기동 시 조회, 점선 작은 간격) -->
  <line x1="220" y1="340" x2="200" y2="450" stroke="#d4d4d8" stroke-width="1" stroke-dasharray="2 3" marker-end="url(#arrow)"/>

  <!-- ── Other Senders ── -->
  <rect x="130" y="452" width="140" height="60" rx="8" fill="#ffffff" stroke="#d4d4d8" stroke-width="1.5"/>
  <text x="200" y="474" text-anchor="middle" font-size="11" font-weight="600" fill="#18181b">Sender</text>
  <text x="200" y="492" text-anchor="middle" font-size="9" fill="#71717a">이벤트 수신</text>
  <text x="200" y="505" text-anchor="middle" font-size="9" fill="#71717a">IDC 전환</text>

  <rect x="330" y="452" width="140" height="60" rx="8" fill="#ffffff" stroke="#d4d4d8" stroke-width="1.5"/>
  <text x="400" y="474" text-anchor="middle" font-size="11" font-weight="600" fill="#18181b">Sender</text>
  <text x="400" y="492" text-anchor="middle" font-size="9" fill="#71717a">이벤트 수신</text>
  <text x="400" y="505" text-anchor="middle" font-size="9" fill="#71717a">IDC 전환</text>

  <rect x="530" y="452" width="140" height="60" rx="8" fill="#ffffff" stroke="#d4d4d8" stroke-width="1.5"/>
  <text x="600" y="474" text-anchor="middle" font-size="11" font-weight="600" fill="#18181b">Sender</text>
  <text x="600" y="492" text-anchor="middle" font-size="9" fill="#71717a">이벤트 수신</text>
  <text x="600" y="505" text-anchor="middle" font-size="9" fill="#71717a">IDC 전환</text>

  <!-- 범례 -->
  <line x1="100" y1="580" x2="130" y2="580" stroke="#52525b" stroke-width="1.5"/>
  <text x="138" y="584" font-size="10" fill="#52525b">Sender 감지 경로</text>

  <line x1="280" y1="580" x2="310" y2="580" stroke="#52525b" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="318" y="584" font-size="10" fill="#52525b">API 수동 트리거</text>

  <line x1="450" y1="580" x2="480" y2="580" stroke="#52525b" stroke-width="1" stroke-dasharray="2 3"/>
  <text x="488" y="584" font-size="10" fill="#52525b">재기동 시 상태 조회</text>

  <!-- Arrow defs -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#d4d4d8"/>
    </marker>
  </defs>
</svg>
