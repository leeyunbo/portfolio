<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 250" font-family="Pretendard, system-ui, sans-serif">
  <!-- SubscriptionCollector -->
  <rect x="80" y="10" width="460" height="36" rx="10" fill="#14332a" stroke="#22c55e" stroke-width="1.5"/>
  <text x="310" y="33" text-anchor="middle" font-size="12" font-weight="600" fill="#a7f3d0">SubscriptionCollector  (@SchedulerMonitor)</text>

  <!-- Arrows to three groups -->
  <line x1="175" y1="46" x2="112" y2="68" stroke="#52525b" stroke-width="1.5" marker-end="url(#ahd)"/>
  <line x1="310" y1="46" x2="305" y2="68" stroke="#52525b" stroke-width="1.5" marker-end="url(#ahd)"/>
  <line x1="445" y1="46" x2="502" y2="68" stroke="#52525b" stroke-width="1.5" marker-end="url(#ahd)"/>

  <!-- LH Fallback Chain -->
  <rect x="15" y="68" width="195" height="72" rx="10" fill="#172554" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="112" y="85" text-anchor="middle" font-size="10" font-weight="700" fill="#bfdbfe">LH 분양 목록</text>
  <text x="112" y="100" text-anchor="middle" font-size="9" fill="#93c5fd">① 웹 스크래핑</text>
  <text x="112" y="112" text-anchor="middle" font-size="7" fill="#f87171">실패 시 ↓</text>
  <text x="112" y="125" text-anchor="middle" font-size="9" fill="#93c5fd">② 공공데이터 API</text>

  <!-- ApplyHome Chain -->
  <rect x="220" y="68" width="170" height="72" rx="10" fill="#172554" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="305" y="85" text-anchor="middle" font-size="10" font-weight="700" fill="#bfdbfe">청약Home 분양 목록</text>
  <text x="305" y="108" text-anchor="middle" font-size="9" fill="#93c5fd">① 청약홈 API</text>

  <!-- 부가 데이터 -->
  <rect x="400" y="68" width="205" height="72" rx="10" fill="#451a03" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="502" y="85" text-anchor="middle" font-size="10" font-weight="700" fill="#fde68a">부가 데이터</text>
  <text x="502" y="102" text-anchor="middle" font-size="9" fill="#fcd34d">경쟁률 · 분양가 API</text>
  <text x="502" y="116" text-anchor="middle" font-size="9" fill="#fcd34d">실거래가 API (12개월)</text>
  <text x="502" y="130" text-anchor="middle" font-size="9" fill="#fcd34d">카카오 지오코딩</text>

  <!-- Arrows to PostgreSQL -->
  <line x1="112" y1="140" x2="195" y2="162" stroke="#52525b" stroke-width="1.5" marker-end="url(#ahd)"/>
  <line x1="305" y1="140" x2="310" y2="162" stroke="#52525b" stroke-width="1.5" marker-end="url(#ahd)"/>
  <line x1="502" y1="140" x2="425" y2="162" stroke="#52525b" stroke-width="1.5" marker-end="url(#ahd)"/>

  <!-- PostgreSQL -->
  <rect x="80" y="162" width="460" height="36" rx="10" fill="#3b0d1e" stroke="#ec4899" stroke-width="1.5"/>
  <text x="310" y="185" text-anchor="middle" font-size="12" font-weight="600" fill="#fbcfe8">PostgreSQL + Caffeine Cache</text>

  <!-- Three outputs -->
  <line x1="160" y1="198" x2="160" y2="218" stroke="#52525b" stroke-width="1" stroke-dasharray="4"/>
  <line x1="310" y1="198" x2="310" y2="218" stroke="#52525b" stroke-width="1" stroke-dasharray="4"/>
  <line x1="460" y1="198" x2="460" y2="218" stroke="#52525b" stroke-width="1" stroke-dasharray="4"/>
  <text x="160" y="237" text-anchor="middle" font-size="10" font-weight="600" fill="#71717a">청약 캘린더</text>
  <text x="310" y="237" text-anchor="middle" font-size="10" font-weight="600" fill="#71717a">시세 비교 + 지도</text>
  <text x="460" y="237" text-anchor="middle" font-size="10" font-weight="600" fill="#71717a">일일 리포트</text>

  <defs>
    <marker id="ahd" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#52525b"/>
    </marker>
  </defs>
</svg>
