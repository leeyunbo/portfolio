<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 520" font-family="Pretendard, system-ui, sans-serif">
  <!-- Bootstrap Layer -->
  <rect x="20" y="20" width="560" height="70" rx="12" fill="#2e1065" stroke="#a855f7" stroke-width="1.5"/>
  <text x="300" y="45" text-anchor="middle" font-size="13" font-weight="700" fill="#e9d5ff">Bootstrap Layer (독립 배포 단위)</text>
  <text x="300" y="68" text-anchor="middle" font-size="11" fill="#c4b5fd">SMS · Kakao · RCS · Naver (sender / receiver) · Reporter</text>

  <line x1="300" y1="90" x2="300" y2="110" stroke="#52525b" stroke-width="1.5" marker-end="url(#arrowd)"/>

  <!-- UseCase Layer -->
  <rect x="120" y="110" width="360" height="55" rx="12" fill="#172554" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="300" y="135" text-anchor="middle" font-size="13" font-weight="700" fill="#bfdbfe">UseCase Layer</text>
  <text x="300" y="153" text-anchor="middle" font-size="11" fill="#93c5fd">채널별 발송 오케스트레이션</text>

  <line x1="200" y1="165" x2="160" y2="200" stroke="#52525b" stroke-width="1.5" marker-end="url(#arrowd)"/>
  <line x1="400" y1="165" x2="440" y2="200" stroke="#52525b" stroke-width="1.5" marker-end="url(#arrowd)"/>

  <!-- Platform Layer -->
  <rect x="20" y="200" width="270" height="75" rx="12" fill="#422006" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="155" y="225" text-anchor="middle" font-size="13" font-weight="700" fill="#fde68a">Platform (외부 API)</text>
  <text x="155" y="245" text-anchor="middle" font-size="11" fill="#fcd34d">SKT · KT · LG+ · Kakao</text>
  <text x="155" y="262" text-anchor="middle" font-size="11" fill="#fcd34d">RCS · Naver</text>

  <!-- Infrastructure Layer -->
  <rect x="310" y="200" width="270" height="75" rx="12" fill="#3b0d1e" stroke="#ec4899" stroke-width="1.5"/>
  <text x="445" y="225" text-anchor="middle" font-size="13" font-weight="700" fill="#fbcfe8">Infrastructure</text>
  <text x="445" y="245" text-anchor="middle" font-size="11" fill="#f9a8d4">R2DBC (채널별 DB) · RabbitMQ</text>
  <text x="445" y="262" text-anchor="middle" font-size="11" fill="#f9a8d4">Netty (TCP)</text>

  <line x1="155" y1="275" x2="250" y2="320" stroke="#52525b" stroke-width="1.5" marker-end="url(#arrowd)"/>
  <line x1="300" y1="165" x2="300" y2="320" stroke="#52525b" stroke-width="1.5" stroke-dasharray="4" marker-end="url(#arrowd)"/>
  <line x1="445" y1="275" x2="350" y2="320" stroke="#52525b" stroke-width="1.5" marker-end="url(#arrowd)"/>

  <!-- Core Layer -->
  <rect x="100" y="320" width="400" height="70" rx="12" fill="#14332a" stroke="#22c55e" stroke-width="2"/>
  <text x="300" y="348" text-anchor="middle" font-size="13" font-weight="700" fill="#a7f3d0">Core Layer (Pure Domain, 의존성 없음)</text>
  <text x="300" y="370" text-anchor="middle" font-size="11" fill="#86efac">채널별 Domain · Protocol · Routing · Partner</text>

  <!-- Core → Library -->
  <line x1="300" y1="390" x2="300" y2="430" stroke="#52525b" stroke-width="1.5" stroke-dasharray="4" marker-end="url(#arrowd)"/>
  <text x="395" y="415" text-anchor="start" font-size="9" fill="#71717a">* 모든 레이어에서 참조</text>

  <!-- Library -->
  <rect x="170" y="430" width="260" height="50" rx="12" fill="#27272a" stroke="#52525b" stroke-width="1"/>
  <text x="300" y="452" text-anchor="middle" font-size="12" font-weight="600" fill="#a1a1aa">Library</text>
  <text x="300" y="469" text-anchor="middle" font-size="10" fill="#71717a">ID Generator · Logging · Webhook</text>

  <defs>
    <marker id="arrowd" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#52525b"/>
    </marker>
  </defs>
</svg>
