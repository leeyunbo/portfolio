<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 520" font-family="Pretendard, system-ui, sans-serif">
  <!-- Bootstrap Layer -->
  <rect x="20" y="20" width="560" height="70" rx="12" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1.5"/>
  <text x="300" y="45" text-anchor="middle" font-size="13" font-weight="700" fill="#6a1b9a">Bootstrap Layer (독립 배포 단위)</text>
  <text x="300" y="68" text-anchor="middle" font-size="11" fill="#7b1fa2">SMS · Kakao · RCS · Naver (sender / receiver) · Reporter</text>

  <!-- Arrow -->
  <line x1="300" y1="90" x2="300" y2="110" stroke="#9e9e9e" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- UseCase Layer -->
  <rect x="120" y="110" width="360" height="55" rx="12" fill="#e3f2fd" stroke="#2196f3" stroke-width="1.5"/>
  <text x="300" y="135" text-anchor="middle" font-size="13" font-weight="700" fill="#1565c0">UseCase Layer</text>
  <text x="300" y="153" text-anchor="middle" font-size="11" fill="#1976d2">채널별 발송 오케스트레이션</text>

  <!-- Arrows to Platform & Infrastructure -->
  <line x1="200" y1="165" x2="160" y2="200" stroke="#9e9e9e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="400" y1="165" x2="440" y2="200" stroke="#9e9e9e" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Platform Layer -->
  <rect x="20" y="200" width="270" height="75" rx="12" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5"/>
  <text x="155" y="225" text-anchor="middle" font-size="13" font-weight="700" fill="#e65100">Platform (외부 API)</text>
  <text x="155" y="245" text-anchor="middle" font-size="11" fill="#f57c00">SKT · KT · LG+ · Kakao</text>
  <text x="155" y="262" text-anchor="middle" font-size="11" fill="#f57c00">RCS · Naver</text>

  <!-- Infrastructure Layer -->
  <rect x="310" y="200" width="270" height="75" rx="12" fill="#fce4ec" stroke="#e91e63" stroke-width="1.5"/>
  <text x="445" y="225" text-anchor="middle" font-size="13" font-weight="700" fill="#880e4f">Infrastructure</text>
  <text x="445" y="245" text-anchor="middle" font-size="11" fill="#c2185b">R2DBC (채널별 DB) · RabbitMQ</text>
  <text x="445" y="262" text-anchor="middle" font-size="11" fill="#c2185b">Netty (TCP)</text>

  <!-- Arrows to Core -->
  <line x1="155" y1="275" x2="250" y2="320" stroke="#9e9e9e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="300" y1="165" x2="300" y2="320" stroke="#9e9e9e" stroke-width="1.5" stroke-dasharray="4" marker-end="url(#arrow)"/>
  <line x1="445" y1="275" x2="350" y2="320" stroke="#9e9e9e" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Core Layer -->
  <rect x="100" y="320" width="400" height="70" rx="12" fill="#e8f5e9" stroke="#4caf50" stroke-width="2"/>
  <text x="300" y="348" text-anchor="middle" font-size="13" font-weight="700" fill="#2e7d32">Core Layer (Pure Domain, 의존성 없음)</text>
  <text x="300" y="370" text-anchor="middle" font-size="11" fill="#388e3c">채널별 Domain · Protocol · Routing · Partner</text>

  <!-- Core → Library -->
  <line x1="300" y1="390" x2="300" y2="430" stroke="#9e9e9e" stroke-width="1.5" stroke-dasharray="4" marker-end="url(#arrow)"/>
  <text x="395" y="415" text-anchor="start" font-size="9" fill="#9e9e9e">* 모든 레이어에서 참조</text>

  <!-- Library -->
  <rect x="170" y="430" width="260" height="50" rx="12" fill="#f5f5f5" stroke="#9e9e9e" stroke-width="1"/>
  <text x="300" y="452" text-anchor="middle" font-size="12" font-weight="600" fill="#616161">Library</text>
  <text x="300" y="469" text-anchor="middle" font-size="10" fill="#757575">ID Generator · Logging · Webhook</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9e9e9e"/>
    </marker>
  </defs>
</svg>
